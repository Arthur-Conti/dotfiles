
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-3,2560x1440@165,auto,auto
monitor=HDMI-A-1,1920x1080@99.93,auto,auto, transform, 3

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$menu = hyprlauncher

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = qs -c noctalia-shell
exec-once = /usr/lib/kdeconnectd
exec-once = qs -c overview

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 20
    rounding_power = 2
    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2
        xray = true
        new_optimizations = true
        vibrancy = 0.1696
    }
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true
    # Animation curves
    
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 1, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,br
    kb_variant =
    kb_options = grp:alt_shift_toggle 
    kb_model =
    kb_rules =

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

$ipc = qs -c noctalia-shell ipc call

# 1. Noctalia
bind = $mainMod, A, exec, $ipc controlCenter toggle #"Control Center"
bind = $mainMod, SPACE, exec, $ipc launcher toggle #"Launcher"
bind = $mainMod, comma, exec, $ipc settings toggle #"Settings"
bind = $mainMod, V, exec, $ipc launcher clipboard #"Clipboard History"
bind = $mainMod, TAB, exec, qs ipc -c overview call overview toggle #"Launch Windows"
bind = $mainMod, C, exec, $ipc calendar toggle #"Calendar"
bind = $mainMod, M, exec, $ipc sessionMenu toggle #"Session Menu"
bind = $mainMod, L, exec, $ipc lockScreen lock #"Lock Scheen"
bind = $mainMod, H, exec, $ipc notifications toggleHistory #"Notification History"
bind = $mainMod, N, exec, $ipc notifications clear #"Clear Notifications"
bind = $mainMod SHIFT, C, exec, $ipc bar toggle #"Toggle Bar"
bind = $mainMod, P, exec, $ipc wallpaper toggle #"Wallpaper Selector"
bind = $mainMod, R, exec, $ipc launcher command #"Launch Command"
bind = $mainMod, Z, exec, $ipc plugin:zed-provider toggle #"Zed Launcher"
bind = $mainMod, K, exec, $ipc plugin:keybind-cheatsheet toggle #"Keybinds Cheatsheet"

# 2. Navigation Basic
bind = $mainMod, F, fullscreen, 0 #"Fullscreen"
bind = $mainMod SHIFT, F, fullscreen, 1 #"Fullscreen with borders"
bind = $mainMod, RETURN, exec, $terminal #"Teminal"
bind = $mainMod, W, killactive, #"Close Window"
bind = $mainMod, E, exec, $fileManager #"File Manager"
bind = $mainMod, X, togglefloating, #"Toogle Floating"
bind = $mainMod, B, exec, zen-browser #"Toogle Browser"
bind = $mainMod, J, exec, ghostty && btop #"Toogle BTOP"

# 3. Navigation Windows
bind = $mainMod, left, movefocus, l #"Move Focus Left"
bind = $mainMod, right, movefocus, r #"Move Focus Right"
bind = $mainMod, up, movefocus, u #"Move Focus Up"
bind = $mainMod, down, movefocus, d #"Move Focus Down"

# 4. Navigation Workspaces
bind = $mainMod CTRL, left, workspace, e-1 #"Move to Previous  Workspace"
bind = $mainMod CTRL, right, workspace, e+1 #"Move to Next Workspace"
bind = $mainMod, 1, workspace, 1 #"Move to Workspace 1"
bind = $mainMod, 2, workspace, 2 #"Move to Workspace 2"
bind = $mainMod, 3, workspace, 3 #"Move to Workspace 3"
bind = $mainMod, 4, workspace, 4 #"Move to Workspace 4"
bind = $mainMod, 5, workspace, 5 #"Move to Workspace 5"
bind = $mainMod, 6, workspace, 6 #"Move to Workspace 6"
bind = $mainMod, 7, workspace, 7 #"Move to Workspace 7"
bind = $mainMod, 8, workspace, 8 #"Move to Workspace 8"
bind = $mainMod, 9, workspace, 9 #"Move to Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Move to Workspace 10"

# 5. Move Window
bind = $mainMod SHIFT, left, movewindow, l #"Move Window to Left"
bind = $mainMod SHIFT, right, movewindow, r #"Move Window to Right"
bind = $mainMod SHIFT, up, movewindow, u #"Move Window Up"
bind = $mainMod SHIFT, down, movewindow, d #"Move Window Down"

# 6. Move Window - Worskspaces
bind = $mainMod CTRL, 1, movetoworkspace, 1 #"Move Window to Workspace 1"
bind = $mainMod CTRL, 2, movetoworkspace, 2 #"Move Window to Workspace 2"
bind = $mainMod CTRL, 3, movetoworkspace, 3 #"Move Window to Workspace 3"
bind = $mainMod CTRL, 4, movetoworkspace, 4 #"Move Window to Workspace 4"
bind = $mainMod CTRL, 5, movetoworkspace, 5 #"Move Window to Workspace 5"
bind = $mainMod CTRL, 6, movetoworkspace, 6 #"Move Window to Workspace 6"
bind = $mainMod CTRL, 7, movetoworkspace, 7 #"Move Window to Workspace 7"
bind = $mainMod CTRL, 8, movetoworkspace, 8 #"Move Window to Workspace 8"
bind = $mainMod CTRL, 9, movetoworkspace, 9 #"Move Window to Workspace 9"
bind = $mainMod CTRL, 0, movetoworkspace, 10 #"Move Window to Workspace 10"

# 7. Print Screen
bind = $mainMod, S, exec, ~/.local/bin/hyprshot -m region --clipboard-only #"Print Screen (Region)"
bind = $mainMod SHIFT, S, exec, ~/.local/bin/hyprshot -m window --clipboard-only #"Print Screen (Window)"
bind = $mainMod ALT, S, exec, ~/.local/bin/hyprshot -m output --clipboard-only #"Print Screen (Full)"

# 8. Resize Window
binde = $mainMod ALT, right, resizeactive, 20 0 #"Resize Window to Right"
binde = $mainMod ALT, left, resizeactive, -20 0 #"Resize Window to Left"
binde = $mainMod ALT, up, resizeactive, 0 -20 #"Resize Window Up"
binde = $mainMod ALT, down, resizeactive, 0 20 #"Resize Window Down"

# 9. Audio
binde = $mainMod, equal, exec, $ipc volume increase #"Volume Up"
binde = $mainMod, minus, exec, $ipc volume decrease #"Volume Down"
bindl = $mainMod, delete, exec, $ipc media playPause #"Pause/Play Media"

# Mouse Binds
bind = $mainMod, mouse_down, workspace, e+1 
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 10. Others
bind = $mainMod, Backspace, setprop, active opaque toggle #"Toggle Window Opacity"

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = workspace-vesktop

    match:class = ^(vesktop)$

    workspace = 10
}

source = /home/arthur/.config/hypr/noctalia/noctalia-colors.conf

workspace = 1, monitor:DP-3, persistent:true
workspace = 2, monitor:DP-3, persistent:true
workspace = 3, monitor:DP-3, persistent:true
workspace = 4, monitor:DP-3, persistent:true
workspace = 5, monitor:DP-3, persistent:true

workspace = 6, monitor:HDMI-A-1, persistent:true
workspace = 7, monitor:HDMI-A-1, persistent:true
workspace = 8, monitor:HDMI-A-1, persistent:true
workspace = 9, monitor:HDMI-A-1, persistent:true
workspace = 10, monitor:HDMI-A-1, persistent:true
